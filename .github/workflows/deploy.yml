name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Web: GitHub Pages (main only) ----
  web:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build --filter=@ekajaya/web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - id: pages
        uses: actions/deploy-pages@v4

  # ---- API: Cloudflare Workers (main only) ----
  api:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: api-production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build --filter=@ekajaya/api

      - name: Deploy to Cloudflare Workers
        run: bun wrangler deploy --config wrangler.production.jsonc
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply D1 migrations
        run: bun wrangler d1 migrations apply portfolio-db --remote --config wrangler.production.jsonc
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
